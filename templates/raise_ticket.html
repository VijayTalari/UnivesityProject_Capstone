<!DOCTYPE html>
<html>
<head>
    <title>Raise Ticket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* PAGE CENTER */
.page-wrapper {
    padding: 40px;
    background: #f1f5f9;
    min-height: 100vh;
}

/* CARD */
.ticket-card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 800px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* HEADER */
.ticket-card h2 {
    margin-bottom: 10px;
    color: #1e293b;
}

.ticket-card p {
    margin-bottom: 20px;
    color: #475569;
}

/* LABEL */
.ticket-card label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #1e293b;
}

/* TEXTAREA FIX (IMPORTANT) */
.ticket-card textarea {
    width: 100%;
    height: 150px;  /* 🔥 THIS FIXES YOUR ISSUE */
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
    resize: none;
    outline: none;
    margin-bottom: 20px;
}

/* BUTTON */
.ticket-card button {
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #4facfe, #00c6ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.ticket-card button:hover {
    transform: scale(1.05);
}

/* BACK LINK */
.back-link {
    display: inline-block;
    margin-top: 15px;
    color: #2563eb;
    text-decoration: none;
}

.back-link:hover {
    text-decoration: underline;
}

/* FLASH */
.flash {
    margin-top: 10px;
    color: green;
}

</style>

</head>

<body>

<div class="page-wrapper">

    <div class="ticket-card">

        <h2>Raise New Ticket 📝</h2>
        <p>Describe your issue and submit a request</p>

        <form method="POST">

            <label>Description</label>

            <!-- FIXED TEXTAREA -->
            <textarea name="description" placeholder="Describe your issue clearly..." required></textarea>

            <button type="submit">Submit Ticket</button>

        </form>

        <a href="/user" class="back-link">⬅ Back to Dashboard</a>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p class="flash">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

    </div>

</div>

</body>
</html>
